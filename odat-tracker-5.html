<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Odat Tracker">
  <title>Odat Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1040 50%, #24243e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8e0ff;
    }
    #header {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 20px 16px 14px;
      text-align: center;
    }
    #subtitle { font-size: 11px; color: #9d8fff; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
    #title { font-size: 24px; font-weight: 800; color: #fff; }
    #today-label { font-size: 13px; color: #fbbf24; margin-top: 4px; }
    #stats-row { display: flex; justify-content: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .stat-box { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 8px 14px; min-width: 75px; border: 1px solid rgba(255,255,255,0.08); }
    .stat-val { font-size: 18px; font-weight: 800; }
    .stat-lbl { font-size: 10px; color: #9d8fff; margin-top: 1px; }
    #progress-bar-wrap { max-width: 360px; margin: 12px auto 0; background: rgba(255,255,255,0.08); border-radius: 99px; height: 6px; }
    #progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #7c3aed, #a78bfa); transition: width 0.5s; width: 0%; }
    #tabs { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
    .tab-btn { padding: 7px 14px; border-radius: 99px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .tab-btn.active { background: #7c3aed; color: #fff; }
    .tab-btn:not(.active) { background: rgba(255,255,255,0.08); color: #9d8fff; }
    #content { max-width: 960px; margin: 0 auto; padding: 20px 14px 40px; }

    /* TODAY */
    #today-score { text-align: center; margin-bottom: 18px; }
    #today-pct { font-size: 48px; font-weight: 900; color: #fbbf24; }
    #today-sub { color: #9d8fff; font-size: 13px; margin-top: 2px; }
    #habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .habit-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 12px 12px; border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      cursor: pointer; text-align: left; color: #e8e0ff; width: 100%;
      transition: all 0.2s;
    }
    .habit-btn.done { border-color: #7c3aed; background: rgba(124,58,237,0.18); }
    .habit-btn.fail { border-color: #dc2626; background: rgba(220,38,38,0.15); }
    .habit-emoji { font-size: 22px; flex-shrink: 0; }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-weight: 700; font-size: 12px; }
    .habit-note { font-size: 10px; color: #9d8fff; }
    .habit-check { font-size: 16px; flex-shrink: 0; }

    /* GRID */
    #grid-wrap { overflow-x: auto; }
    table { border-collapse: separate; border-spacing: 2px 2px; min-width: 750px; width: 100%; }
    .th-habit { text-align: left; padding: 5px 8px; font-size: 11px; color: #9d8fff; white-space: nowrap; font-weight: 600; }
    .th-day { padding: 2px 1px; font-size: 9px; color: #9d8fff; text-align: center; min-width: 22px; font-weight: 400; }
    .th-day.today-col { color: #fbbf24; font-weight: 800; }
    .th-total { padding: 4px 6px; font-size: 10px; color: #9d8fff; font-weight: 600; }
    .td-habit { padding: 3px 8px; font-size: 11px; white-space: nowrap; color: #e8e0ff; font-weight: 500; }
    .td-note { font-size: 9px; color: #9d8fff; margin-left: 3px; }
    .cell-btn {
      width: 22px; height: 22px; border-radius: 5px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
      background: rgba(255,255,255,0.06); color: #6b6a8a;
    }
    .cell-btn.today-col { background: rgba(251,191,36,0.15); outline: 1.5px solid rgba(251,191,36,0.4); }
    .cell-btn.done { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; }
    .cell-btn.fail { background: rgba(220,38,38,0.3); color: #f87171; }
    .td-total { text-align: center; padding: 3px 6px; font-size: 11px; font-weight: 700; }
    .score-cell { width: 22px; height: 22px; border-radius: 5px; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 700; }

    /* STATS */
    #stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 13px 14px; border: 1px solid rgba(255,255,255,0.08); }
    .stat-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .stat-card-name { font-weight: 700; font-size: 12px; }
    .stat-card-note { font-size: 10px; color: #9d8fff; }
    .stat-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 99px; height: 5px; margin-bottom: 7px; }
    .stat-bar { height: 100%; border-radius: 99px; transition: width 0.5s; }
    .stat-card-foot { display: flex; justify-content: space-between; font-size: 10px; }
  </style>
</head>
<body>
<div id="header">
  <div id="subtitle">22-iyun — 21-iyul 2026</div>
  <div id="title">Odat Tracker ✨</div>
  <div id="today-label"></div>
  <div id="stats-row">
    <div class="stat-box"><div class="stat-val" id="s-umumiy" style="color:#a78bfa">0%</div><div class="stat-lbl">Umumiy</div></div>
    <div class="stat-box"><div class="stat-val" id="s-namoz" style="color:#34d399">0 kun</div><div class="stat-lbl">Namoz to'liq</div></div>
    <div class="stat-box"><div class="stat-val" id="s-bugun" style="color:#fbbf24">0%</div><div class="stat-lbl">Bugun</div></div>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('today')">📅 Bugun</button>
    <button class="tab-btn" onclick="showTab('grid')">📋 Jadval</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 Statistika</button>
  </div>
</div>

<div id="content">
  <div id="tab-today">
    <div id="today-score">
      <div id="today-pct">0%</div>
      <div id="today-sub"></div>
    </div>
    <div id="habits-grid"></div>
  </div>
  <div id="tab-grid" style="display:none"><div id="grid-wrap"><table id="grid-table"></table></div></div>
  <div id="tab-stats" style="display:none"><div id="stats-grid"></div></div>
</div>

<script>
var START_DATE = new Date(2026, 5, 22);
var STORAGE_KEY = 'odat_tracker_v3';

var HABITS = [
  { id:'erta_turish',    label:'Erta turish',    emoji:'🌅', note:'3:40 da' },
  { id:'bomdod',         label:'Bomdod',          emoji:'🕌', note:'' },
  { id:'otjimaniya',     label:'Otjimaniya',      emoji:'💪', note:'15 ta' },
  { id:'pres',           label:'Pres',            emoji:'🔥', note:'15 ta' },
  { id:'otirib_turish',  label:"O'tirib turish",  emoji:'🦵', note:'15 ta' },
  { id:'peshin',         label:'Peshin',          emoji:'🕌', note:'' },
  { id:'asr',            label:'Asr',             emoji:'🕌', note:'' },
  { id:'tarix',          label:"Tarix o'qish",    emoji:'📚', note:'5 ta mavzu' },
  { id:'shaxmat',        label:'Shaxmat',         emoji:'♟️', note:'' },
  { id:'shom',           label:'Shom',            emoji:'🕌', note:'' },
  { id:'vibe_coding',    label:'Vibe Coding',     emoji:'💻', note:'30 min' },
  { id:'xufton',         label:'Xufton',          emoji:'🕌', note:'' },
  { id:'vitr',           label:'Vitr Vojib',      emoji:'🌙', note:'' },
  { id:'erta_uxlash',    label:'Erta uxlash',     emoji:'😴', note:'23:00 gacha' }
];

var DAYS = (function() {
  var arr = [];
  for (var i = 0; i < 30; i++) {
    var d = new Date(START_DATE);
    d.setDate(START_DATE.getDate() + i);
    arr.push({ index: i+1, date: d.getDate(), month: d.getMonth()+1, full: new Date(d) });
  }
  return arr;
})();

function monthName(m) { return m===6?'iyun':m===7?'iyul':''; }
function monthShort(m) { return m===6?'iyn':'iyl'; }

var DATA = {};
try { DATA = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { DATA = {}; }
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch(e) {} }

// State: '' = empty, 'done' = ✅, 'fail' = ❌
function getState(hid, idx) { return DATA[hid+'_'+idx] || ''; }
function isDone(hid, idx) { return getState(hid, idx) === 'done'; }

function toggle(hid, idx) {
  var cur = getState(hid, idx);
  if (cur === '') DATA[hid+'_'+idx] = 'done';
  else if (cur === 'done') DATA[hid+'_'+idx] = 'fail';
  else DATA[hid+'_'+idx] = '';
  saveData();
  render();
}

function getTodayIndex() {
  var now = new Date(); now.setHours(0,0,0,0);
  for (var i = 0; i < DAYS.length; i++) {
    var d = new Date(DAYS[i].full); d.setHours(0,0,0,0);
    if (d.getTime() === now.getTime()) return i+1;
  }
  if (now < new Date(START_DATE)) return 1;
  return 30;
}

var todayIdx = getTodayIndex();
var todayDay = DAYS[todayIdx-1];

function dayScore(idx) {
  var done = 0;
  for (var i = 0; i < HABITS.length; i++) { if (isDone(HABITS[i].id, idx)) done++; }
  return Math.round(done / HABITS.length * 100);
}
function habitScore(hid) {
  var cnt = 0;
  for (var i = 0; i < DAYS.length; i++) { if (isDone(hid, DAYS[i].index)) cnt++; }
  return cnt;
}
function totalDone() {
  var t = 0;
  for (var i = 0; i < HABITS.length; i++) t += habitScore(HABITS[i].id);
  return t;
}
function overallPct() { return Math.round(totalDone() / (HABITS.length * 30) * 100); }
function streakFor(hid) {
  var s = 0;
  for (var i = todayIdx; i >= 1; i--) { if (isDone(hid, i)) s++; else break; }
  return s;
}
function namozFullDays() {
  var nm = HABITS.filter(function(h){ return h.emoji==='🕌'; });
  return DAYS.filter(function(d){ return nm.every(function(h){ return isDone(h.id, d.index); }); }).length;
}

var currentTab = 'today';
function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-today').style.display = tab==='today' ? '' : 'none';
  document.getElementById('tab-grid').style.display  = tab==='grid'  ? '' : 'none';
  document.getElementById('tab-stats').style.display = tab==='stats' ? '' : 'none';
  var btns = document.querySelectorAll('.tab-btn');
  var tabs = ['today','grid','stats'];
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', tabs[i]===tab);
  }
  render();
}

function render() {
  var pct = overallPct();
  var dScore = dayScore(todayIdx);
  document.getElementById('today-label').textContent = todayDay.date+'-'+monthName(todayDay.month)+' · '+todayIdx+'-kun';
  document.getElementById('s-umumiy').textContent = pct+'%';
  document.getElementById('s-namoz').textContent = namozFullDays()+' kun';
  document.getElementById('s-bugun').textContent = dScore+'%';
  document.getElementById('progress-bar').style.width = pct+'%';

  if (currentTab==='today') renderToday();
  if (currentTab==='grid')  renderGrid();
  if (currentTab==='stats') renderStats();
}

function renderToday() {
  var dScore = dayScore(todayIdx);
  var doneCnt = 0;
  for (var i = 0; i < HABITS.length; i++) { if (isDone(HABITS[i].id, todayIdx)) doneCnt++; }
  document.getElementById('today-pct').textContent = dScore+'%';
  document.getElementById('today-sub').textContent = doneCnt+'/'+HABITS.length+' bajarildi';

  var grid = document.getElementById('habits-grid');
  grid.innerHTML = '';
  for (var i = 0; i < HABITS.length; i++) {
    var h = HABITS[i];
    var st = getState(h.id, todayIdx);
    var icon = st==='done' ? '✅' : st==='fail' ? '❌' : '—';
    var cls = 'habit-btn' + (st==='done'?' done':st==='fail'?' fail':'');
    var btn = document.createElement('button');
    btn.className = cls;
    btn.innerHTML =
      '<span class="habit-emoji">'+h.emoji+'</span>'+
      '<div class="habit-info">'+
        '<div class="habit-name">'+h.label+'</div>'+
        (h.note ? '<div class="habit-note">'+h.note+'</div>' : '')+
      '</div>'+
      '<span class="habit-check">'+icon+'</span>';
    (function(hid, idx){ btn.onclick = function(){ toggle(hid, idx); }; })(h.id, todayIdx);
    grid.appendChild(btn);
  }
}

function renderGrid() {
  var html = '<thead><tr><th class="th-habit">Odat</th>';
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var isTd = d.index===todayIdx;
    html += '<th class="th-day'+(isTd?' today-col':'')+'"><div>'+d.date+'</div><div style="font-size:7px;opacity:0.6">'+monthShort(d.month)+'</div></th>';
  }
  html += '<th class="th-total">Jami</th></tr></thead><tbody>';

  for (var hi = 0; hi < HABITS.length; hi++) {
    var h = HABITS[hi];
    html += '<tr><td class="td-habit">'+h.emoji+' '+h.label+(h.note?'<span class="td-note">('+h.note+')</span>':'')+'</td>';
    for (var di = 0; di < DAYS.length; di++) {
      var d = DAYS[di];
      var st = getState(h.id, d.index);
      var isTd = d.index===todayIdx;
      var cellCls = 'cell-btn'+(st==='done'?' done':st==='fail'?' fail':(isTd?' today-col':''));
      var cellIcon = st==='done'?'✓':st==='fail'?'✕':'·';
      html += '<td style="text-align:center;padding:1px"><button class="'+cellCls+'" onclick="toggle(\''+h.id+'\','+d.index+')">'+cellIcon+'</button></td>';
    }
    var sc = habitScore(h.id);
    var col = sc>=20?'#34d399':sc>=10?'#fbbf24':'#f87171';
    html += '<td class="td-total" style="color:'+col+'">'+sc+'/30</td></tr>';
  }

  html += '<tr><td style="padding:5px 8px;font-size:10px;color:#9d8fff;font-weight:600">Kun %</td>';
  for (var i = 0; i < DAYS.length; i++) {
    var p = dayScore(DAYS[i].index);
    var bg = p===100?'linear-gradient(135deg,#059669,#34d399)':p>=60?'rgba(251,191,36,0.2)':'rgba(255,255,255,0.03)';
    var col = p>=60?'#fbbf24':'#6b6a8a';
    html += '<td style="text-align:center;padding:1px"><div class="score-cell" style="background:'+bg+';color:'+col+'">'+(p>0?p:'')+'</div></td>';
  }
  html += '<td></td></tr></tbody>';
  document.getElementById('grid-table').innerHTML = html;
}

function renderStats() {
  var html = '';
  for (var i = 0; i < HABITS.length; i++) {
    var h = HABITS[i];
    var cnt = habitScore(h.id);
    var pct = Math.round(cnt/30*100);
    var streak = streakFor(h.id);
    var barCol = pct>=80?'#34d399':pct>=50?'#fbbf24':'#a78bfa';
    var pctCol = pct>=80?'#34d399':pct>=50?'#fbbf24':'#f87171';
    html += '<div class="stat-card">'+
      '<div class="stat-card-head"><span style="font-size:20px">'+h.emoji+'</span>'+
      '<div><div class="stat-card-name">'+h.label+'</div>'+(h.note?'<div class="stat-card-note">'+h.note+'</div>':'')+'</div></div>'+
      '<div class="stat-bar-wrap"><div class="stat-bar" style="width:'+pct+'%;background:'+barCol+'"></div></div>'+
      '<div class="stat-card-foot"><span style="color:#9d8fff">'+cnt+'/30</span><span style="color:#fbbf24">🔥 '+streak+' streak</span><span style="color:'+pctCol+';font-weight:700">'+pct+'%</span></div>'+
      '</div>';
  }
  document.getElementById('stats-grid').innerHTML = html;
}

render();
</script>
</body>
</html>
